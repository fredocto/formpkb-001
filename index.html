  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;

      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 14px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.1);

    .logo img {

    }

      color: #333;
    }

    .btn {

      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: #2e7d32;

      font-weight: bold;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1b5e20;

    }
    body {
  margin: 0;
  font-family: Arial, sans-serif;

  background:
    linear-gradient(
      rgba(40,40,40,0.75),
      rgba(120,120,120,0.65)
    ),

  background-size: cover;
  filter: grayscale(100%);

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
    body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 60%);

    .logo img {

}
