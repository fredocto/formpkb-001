<!DOCTYPE html>
<html>
<head>
  <title>Dewan Pelkat PKB GPIB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 14px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.1);
      max-width: 350px;
      width: 90%;
    }

    .logo img {
      width: 110px;
      margin-bottom: 20px;
      opacity: 0.95;
      transition: 0.2s;
    }

    .logo img:hover {
      opacity: 1;
      transform: scale(1.05);
    }

    h1 {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1b5e20;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <div class="container">
    
    <div class="logo">
      <img src="logo.png" alt="PKB GPIB">
    </div>

    <h1>Dewan Pelkat PKB GPIB</h1>

    <a href="/formpkb01" class="btn">
      FORM KSB PKB & KP3 MUPEL
    </a>

  </div>

</body>
</html>
