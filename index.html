<!DOCTYPE html>
<html>
  <meta property="og:title" content="Dewan Pelkat PKB GPIB">
<meta property="og:description" content="Form Pendataan KSB PKB & KP3 MUPEL GPIB">
<meta property="og:image" content="https://pkb.gpib.cloud/og-dpkb.png">
<meta property="og:url" content="https://pkb.gpib.cloud">
<meta property="og:type" content="website">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<head>
  <title>Dewan Pelkat PKB GPIB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  position: relative;

  display: flex;
  justify-content: center;
  align-items: flex-start; /* 🔥 tidak center vertikal */
  padding-top: 80px;       /* 🔥 kontrol jarak atas */

  height: 100vh;
}

/* 🔥 BACKGROUND (GRAYSCALE HANYA DI SINI) */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;

  background:
    linear-gradient(
      rgba(40,40,40,0.75),
      rgba(120,120,120,0.65)
    ),
    url('bg.jpg') no-repeat center center;

  background-size: cover;
  filter: grayscale(100%);
  z-index: -1;
}

/* 🔥 DECOR */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 60%);
  pointer-events: none;
}

/* 🔥 CONTAINER */
.container {
  text-align: center;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(6px);

  padding: 40px 30px;
  border-radius: 14px;
  box-shadow: 0 6px 25px rgba(0,0,0,0.1);

  max-width: 350px;
  width: 90%;
}

/* 🔥 LOGO */
.logo {
  text-align: center;
}

.logo img {
  width: 300px;      /* 🔥 adjust size */
  max-width: 90%;
  height: auto;

  display: block;
  margin: 10 auto 30px auto; /* 🔥 center + jarak bawah */
  filter: none !important;  /* 🔥 paksa tidak grayscale */
}

/* 🔥 BUTTON */
.btn {
  display: block;
  width: 100%;
  max-width: 260px;

  margin: 70px auto 0 auto; /* 🔥 kasih jarak dari logo */

  padding: 14px;
  border-radius: 10px;

  background: #2e7d32;
  color: white;

  text-decoration: none;
  font-weight: bold;
  font-size: 14px;

  text-align: center;
  transition: 0.2s;
}

.btn:hover {
  background: #1b5e20;
  transform: scale(1.03);
}
</style>
  
</head>

<body>

  <div class="container">
    
    <div class="logo">
      <img src="logo-01.png" alt="PKB GPIB">
    </div>


    <a href="/formpkb01" class="btn">
      FORM KSB PKB Jemaat & KP3 MUPEL GPIB
    </a>

  </div>

</body>
</html>
